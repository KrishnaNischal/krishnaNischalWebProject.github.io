<!DOCTYPE html>
<html>
<head>
<title>Basic HTML Structure</title>
<style>
h1 {text-align: center;}
p {text-align: center;}
</style>
</head>

<body>
<h1>Introduction</h1>
<p>
My name is <strong>Krishna Nischal</strong>.<br>
And this is a paragraph with a total of 10 lines.<br>
Some of the words in these lines<br>
are <i>italic</i>, some might be <b>bold</b>.<br>
<u>underlined like this</u>.<br>
Something about me is given below<br>
I am in Second Year in Btech <em><mark>Computer Science</mark> from <small>VIT, Vellore</small>.<br>
<sub>since</sub> <sup>2024</sup>
</p>
</body>
</html>
