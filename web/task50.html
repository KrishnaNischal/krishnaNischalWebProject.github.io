<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>jQuery Fade Effect</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
.container{
width:300px;
margin:50px auto;
text-align:center;
transition:opacity 0.3s;
}

.container img{
width:100%;
border-radius:10px;
}
</style>
</head>
<body>

<div class="container">
<p>Hover over this box</p>
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=300&h=200&fit=crop">
</div>

<script>
$(document).ready(function(){

$(".container").mouseenter(function(){
$(this).find("img").fadeTo(300,0.5);
});

$(".container").mouseleave(function(){
$(this).find("img").fadeTo(300,1);
});

});
</script>

</body>
</html>
