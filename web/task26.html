<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Form</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.form-container{
width:100%;
max-width:700px;
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

.form-row{
display:flex;
gap:15px;
}

.form-group{
flex:1;
display:flex;
flex-direction:column;
margin-bottom:15px;
}

input{
padding:10px;
border:1px solid #ccc;
border-radius:5px;
outline:none;
}

input:focus{
border-color:#3498db;
box-shadow:0 0 5px rgba(52,152,219,0.5);
}

.gender-group{
display:flex;
gap:15px;
margin-top:5px;
}

.gender-group input{
display:none;
}

.gender-group label{
padding:8px 15px;
border:1px solid #ccc;
border-radius:20px;
cursor:pointer;
}

.gender-group input:checked + label{
background:#3498db;
color:#fff;
border-color:#3498db;
}

.checkbox-group{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.checkbox-group input{
display:none;
}

.checkbox-group label{
position:relative;
padding-left:25px;
cursor:pointer;
}

.checkbox-group label:before{
content:"";
position:absolute;
left:0;
top:2px;
width:16px;
height:16px;
border:1px solid #ccc;
border-radius:3px;
}

.checkbox-group input:checked + label:before{
background:#3498db;
border-color:#3498db;
}

button{
width:100%;
padding:12px;
border:none;
background:#3498db;
color:#fff;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

@media(max-width:600px){
.form-row{
flex-direction:column;
}
}
</style>
</head>
<body>

<div class="form-container">
<h2>Registration Form</h2>

<form>

<div class="form-row">
<div class="form-group">
<input type="text" placeholder="First Name" required>
</div>
<div class="form-group">
<input type="text" placeholder="Last Name" required>
</div>
</div>

<div class="form-group">
<input type="email" placeholder="Email" required>
</div>

<div class="form-group">
<input type="tel" placeholder="Phone Number" required>
</div>

<div class="form-row">
<div class="form-group">
<input type="password" placeholder="Password" required>
</div>
<div class="form-group">
<input type="password" placeholder="Confirm Password" required>
</div>
</div>

<div class="form-group">
<input type="date" required>
</div>

<div class="form-group">
<div class="gender-group">
<input type="radio" id="male" name="gender">
<label for="male">Male</label>

<input type="radio" id="female" name="gender">
<label for="female">Female</label>
</div>
</div>

<div class="checkbox-group">
<input type="checkbox" id="terms">
<label for="terms">I agree to the Terms and Conditions</label>
</div>

<button type="submit">Register</button>

</form>
</div>

</body>
</html>
