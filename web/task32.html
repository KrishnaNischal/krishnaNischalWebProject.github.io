<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Status Change</title>
<style>
#status{
color:gray;
font-size:18px;
}
</style>
</head>
<body>

<p id="status">Status: Offline</p>

<button onclick="goOnline()">Go Online</button>

<script>
function goOnline(){
var status = document.getElementById("status");
status.innerHTML = "Status: Online";
status.style.color = "green";
}
</script>

</body>
</html>
