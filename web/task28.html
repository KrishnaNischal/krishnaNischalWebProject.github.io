<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JavaScript Example</title>
</head>
<body>

<p id="text">Click the button to change this text.</p>

<button onclick="changeText()">Click Me</button>

<script>
function changeText(){
document.getElementById("text").innerHTML = "Welcome to JavaScript!";
}
</script>

</body>
</html>
