<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Z-Index Demo</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
}

.header{
position:fixed;
top:0;
left:0;
width:100%;
background:#000;
color:#fff;
padding:15px;
text-align:center;
z-index:100;
}

.content{
margin-top:70px;
padding:20px;
}

.box{
height:200px;
margin:20px 0;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
font-size:20px;
}

.box1{
background:red;
position:relative;
z-index:1;
}

.box2{
background:green;
position:relative;
z-index:2;
}

.box3{
background:blue;
position:relative;
z-index:3;
}

.box4{
background:purple;
position:relative;
z-index:50;
}
</style>
</head>
<body>

<div class="header">
Fixed Header (z-index: 100)
</div>

<div class="content">

<div class="box box1">Box 1 (z-index: 1)</div>
<div class="box box2">Box 2 (z-index: 2)</div>
<div class="box box3">Box 3 (z-index: 3)</div>
<div class="box box4">Box 4 (z-index: 50)</div>

</div>

</body>
</html>
