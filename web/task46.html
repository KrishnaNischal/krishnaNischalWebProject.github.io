<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>jQuery Toggle Example</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
body{
font-family:Arial,sans-serif;
text-align:center;
margin-top:50px;
}
button{
padding:10px 15px;
cursor:pointer;
}
p{
margin-top:20px;
font-size:18px;
}
</style>
</head>
<body>

<button id="toggleBtn">Show/Hide Paragraph</button>

<p id="text">This is a paragraph that can be toggled.</p>

<script>
$(document).ready(function(){
$("#toggleBtn").click(function(){
$("#text").toggle();
});
});
</script>

</body>
</html>
