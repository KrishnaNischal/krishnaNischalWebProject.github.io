<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Caption Overlay</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
position:relative;
width:400px;
}

.container img{
width:100%;
display:block;
position:relative;
z-index:1;
border-radius:10px;
}

.caption{
position:absolute;
bottom:0;
left:0;
width:100%;
padding:10px;
background:rgba(0,0,0,0.6);
color:#fff;
z-index:2;
border-bottom-left-radius:10px;
border-bottom-right-radius:10px;
}
</style>
</head>
<body>

<div class="container">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400&h=300&fit=crop">
<div class="caption">High-quality smartphone with amazing features</div>
</div>

</body>
</html>
