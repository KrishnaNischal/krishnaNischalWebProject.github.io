<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Form</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6a11cb,#2575fc);
}

.login-box{
width:320px;
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
outline:none;
}

input:focus{
border-color:#2575fc;
box-shadow:0 0 8px rgba(37,117,252,0.6);
}

.forgot{
display:block;
text-align:right;
font-size:13px;
text-decoration:none;
color:#2575fc;
margin-bottom:15px;
}

.forgot:hover{
text-decoration:underline;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:5px;
background:#2575fc;
color:#fff;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1a5edb;
transform:scale(1.03);
}
</style>
</head>
<body>

<div class="login-box">
<h2>Login</h2>
<form>
<input type="text" placeholder="Username or Email" required>
<input type="password" placeholder="Password" required>
<a href="#" class="forgot">Forgot Password?</a>
<button type="submit">Login</button>
</form>
</div>

</body>
</html>
