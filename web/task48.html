<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>jQuery Highlight</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
.highlight{
background:lightblue;
padding:10px;
}
</style>
</head>
<body>

<p>Paragraph 1</p>
<p>Paragraph 2</p>

<script>
$(document).ready(function(){
$("p").addClass("highlight");

$("p").click(function(){
$(this).toggleClass("highlight");
});
});
</script>

</body>
</html>
