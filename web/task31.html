<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Show Message</title>
</head>
<body>

<button onclick="showMessage()">Show Message</button>

<div id="message"></div>

<script>
function showMessage(){
document.getElementById("message").innerHTML = "Welcome to JavaScript!";
}
</script>

</body>
</html>
