<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Form</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#74ebd5,#9face6);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.form-container{
width:100%;
max-width:500px;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

.form-group{
margin-bottom:15px;
display:flex;
flex-direction:column;
}

label{
margin-bottom:5px;
font-weight:bold;
}

input, select, textarea{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
outline:none;
font-size:14px;
transition:0.3s;
}

input:focus, select:focus, textarea:focus{
border-color:#6a11cb;
box-shadow:0 0 8px rgba(106,17,203,0.4);
}

textarea{
resize:none;
}

button{
width:100%;
padding:12px;
border:none;
background:#6a11cb;
color:#fff;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#4e0ea3;
transform:translateY(-2px);
}

input[type="file"]{
padding:5px;
border:none;
}
</style>
</head>
<body>

<div class="form-container">
<h2>Contact Us</h2>

<form>

<div class="form-group">
<label>Full Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" required>
</div>

<div class="form-group">
<label>Subject</label>
<select required>
<option value="">Select Subject</option>
<option>General Inquiry</option>
<option>Support</option>
<option>Feedback</option>
</select>
</div>

<div class="form-group">
<label>Message</label>
<textarea rows="4" required></textarea>
</div>

<div class="form-group">
<label>Attachment</label>
<input type="file">
</div>

<button type="submit">Submit</button>

</form>
</div>

</body>
</html>
